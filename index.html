<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>JavaScript Piano</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h2>JavaScript Piano</h2>

      <div class="controls-row">
        <div class="left-controls">
          <button id="theme-toggle">Toggle Theme</button>
          <button id="record-btn">Start Recording</button>
          <button id="playback-btn" disabled>Play Recording</button>
          <button id="clear-btn" disabled>Clear Recording</button>
        </div>

        <div class="right-controls">
          <button id="save-btn" disabled>Save Recording</button>
          <button id="export-btn" disabled>Export Recording</button>
          <button id="qr-btn" disabled>Generate QR Code</button>
          <input type="file" id="import-file" accept=".json" style="display:none" />
          <button id="import-btn">Import Recording</button>
        </div>
      </div>

      <div id="tempo-control" class="tempo-control">
        <label for="tempo">Tempo</label>
        <input id="tempo" type="range" min="50" max="200" value="100" />
        <span id="tempo-value">100%</span>
      </div>
    </header>

    <main>
      <ul class="piano-keys" aria-label="Piano keys">
        <li class="key white" data-key="a" role="button" tabindex="0"><span>a</span></li>
        <li class="key black" data-key="b" role="button" tabindex="0"><span>b</span></li>
        <li class="key white" data-key="c" role="button" tabindex="0"><span>c</span></li>
        <li class="key black" data-key="d" role="button" tabindex="0"><span>d</span></li>
        <li class="key white" data-key="e" role="button" tabindex="0"><span>e</span></li>
      </ul>

      <section id="saved-recordings" class="saved-recordings" aria-live="polite">
        <h3>Saved Recordings</h3>
        <ul id="recordings-list"></ul>
      </section>

      <section id="qr-container" class="qr-container" aria-hidden="true"></section>
    </main>
  </div>

  <!-- QRCode library (small, widely used CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
